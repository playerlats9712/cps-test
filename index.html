<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Tester & Consistency Tester</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden;
            touch-action: manipulation;
        }

        .click-area {
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.2s;
        }

        .click-area:active, .key-active {
            transform: scale(0.98);
            background-color: #1e293b;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #visualizer {
            height: 100px;
            display: flex;
            align-items: flex-end;
            gap: 2px;
        }

        .bar {
            flex: 1;
            background: #38bdf8;
            min-height: 2px;
            transition: height 0.2s ease;
            border-radius: 2px 2px 0 0;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .ripple {
            position: absolute;
            background: rgba(56, 189, 248, 0.3);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-3xl w-full space-y-6">
        <!-- Header -->
        <div class="text-center">
            <h1 class="text-4xl font-800 tracking-tight text-sky-400">CPS TESTER</h1>
            <p class="text-slate-400 mt-2">Press <kbd class="px-2 py-1 bg-slate-800 rounded border border-slate-600 text-xs">W</kbd> or <kbd class="px-2 py-1 bg-slate-800 rounded border border-slate-600 text-xs">↑ Arrow</kbd> to start</p>
        </div>

        <!-- Main Display -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="stat-card p-6 rounded-2xl text-center">
                <p class="text-slate-400 text-sm font-semibold mb-1 uppercase tracking-wider">Current CPS</p>
                <div id="cps-val" class="text-5xl font-800 text-white">0.0</div>
            </div>
            <div class="stat-card p-6 rounded-2xl text-center">
                <p class="text-slate-400 text-sm font-semibold mb-1 uppercase tracking-wider">Consistency</p>
                <div id="consistency-val" class="text-5xl font-800 text-emerald-400">100%</div>
            </div>
            <div class="stat-card p-6 rounded-2xl text-center">
                <p class="text-slate-400 text-sm font-semibold mb-1 uppercase tracking-wider">Max CPS</p>
                <div id="max-cps-val" class="text-5xl font-800 text-amber-400">0.0</div>
            </div>
        </div>

        <!-- Visualizer -->
        <div id="visualizer" class="w-full bg-slate-900/50 rounded-xl overflow-hidden px-2"></div>

        <!-- Click Surface -->
        <div id="click-target" class="click-area relative w-full h-64 bg-slate-800/40 border-2 border-dashed border-slate-700 rounded-3xl flex flex-col items-center justify-center cursor-pointer select-none">
            <div class="text-center z-10">
                <div id="prompt-text" class="text-2xl font-semibold text-slate-500">Tap Keys to Start</div>
                <div id="timer-display" class="hidden text-slate-300 mt-2">Test active...</div>
            </div>
            <!-- Key visual cues -->
            <div class="absolute bottom-6 flex gap-4">
                <div id="key-w" class="w-12 h-12 rounded-lg border-2 border-slate-700 flex items-center justify-center font-bold text-slate-600">W</div>
                <div id="key-up" class="w-12 h-12 rounded-lg border-2 border-slate-700 flex items-center justify-center font-bold text-slate-600">↑</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex justify-between items-center px-2">
            <div class="text-slate-500 text-sm">
                Total Clicks: <span id="total-clicks" class="text-slate-300 font-mono">0</span>
            </div>
            <button id="reset-btn" class="px-6 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-full text-sm font-semibold transition-colors">
                Reset Stats
            </button>
        </div>
    </div>

    <script>
        const clickTarget = document.getElementById('click-target');
        const cpsDisplay = document.getElementById('cps-val');
        const maxCpsDisplay = document.getElementById('max-cps-val');
        const consistencyDisplay = document.getElementById('consistency-val');
        const totalClicksDisplay = document.getElementById('total-clicks');
        const visualizer = document.getElementById('visualizer');
        const keyW = document.getElementById('key-w');
        const keyUp = document.getElementById('key-up');
        const resetBtn = document.getElementById('reset-btn');
        const promptText = document.getElementById('prompt-text');

        // Audio System
        const SFX_URL = 'assets/sfx.m4a';
        const audioPool = [];
        const POOL_SIZE = 15; // Allows overlapping sounds for rapid clicking

        for (let i = 0; i < POOL_SIZE; i++) {
            const audio = new Audio(SFX_URL);
            audio.preload = 'auto';
            audioPool.push(audio);
        }

        let currentAudioIndex = 0;
        function playSfx() {
            const audio = audioPool[currentAudioIndex];
            audio.currentTime = 0;
            audio.play().catch(() => { /* Initial click required by browsers */ });
            currentAudioIndex = (currentAudioIndex + 1) % POOL_SIZE;
        }

        let clickTimestamps = [];
        let intervals = [];
        let maxCps = 0;
        let isActive = false;
        let lastClickTime = 0;

        // Initialize Visualizer Bars
        const BAR_COUNT = 60;
        for (let i = 0; i < BAR_COUNT; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            visualizer.appendChild(bar);
        }
        const bars = document.querySelectorAll('.bar');

        function registerClick(e) {
            const now = performance.now();
            
            // Visual & Audio Feedback
            playSfx();
            createRipple(e);
            
            // Logic
            if (!isActive) {
                isActive = true;
                promptText.innerText = "Clicking!";
                promptText.classList.replace('text-slate-500', 'text-sky-400');
            }

            if (lastClickTime !== 0) {
                const interval = now - lastClickTime;
                intervals.push(interval);
                if (intervals.length > 50) intervals.shift();
            }

            clickTimestamps.push(now);
            lastClickTime = now;
            updateStats();
        }

        function createRipple(e) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            
            const rect = clickTarget.getBoundingClientRect();
            let x, y;

            if (e && e.clientX) {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            } else {
                x = rect.width / 2;
                y = rect.height / 2;
            }

            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            ripple.style.width = ripple.style.height = `100px`;
            ripple.style.marginLeft = ripple.style.marginTop = `-50px`;

            clickTarget.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        function updateStats() {
            const now = performance.now();
            clickTimestamps = clickTimestamps.filter(t => now - t < 1000);
            
            const currentCps = clickTimestamps.length;
            if (currentCps > maxCps) maxCps = currentCps;

            let consistency = 100;
            if (intervals.length > 5) {
                const mean = intervals.reduce((a, b) => a + b) / intervals.length;
                const variance = intervals.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / intervals.length;
                const stdDev = Math.sqrt(variance);
                const cv = (stdDev / mean);
                consistency = Math.max(0, Math.min(100, 100 - (cv * 100)));
            }

            cpsDisplay.innerText = currentCps.toFixed(1);
            maxCpsDisplay.innerText = maxCps.toFixed(1);
            consistencyDisplay.innerText = Math.round(consistency) + "%";
            totalClicksDisplay.innerText = parseInt(totalClicksDisplay.innerText) + 1;

            const barIdx = Math.floor((now / 50) % BAR_COUNT);
            const height = Math.min(100, currentCps * 8);
            bars[barIdx].style.height = `${height}%`;
            bars[barIdx].style.opacity = '1';
        }

        setInterval(() => {
            const now = performance.now();
            const oldLength = clickTimestamps.length;
            clickTimestamps = clickTimestamps.filter(t => now - t < 1000);
            
            if (clickTimestamps.length !== oldLength || clickTimestamps.length === 0) {
                cpsDisplay.innerText = clickTimestamps.length.toFixed(1);
                
                if (clickTimestamps.length === 0 && isActive) {
                    promptText.innerText = "Stopped";
                    promptText.classList.replace('text-sky-400', 'text-slate-500');
                    isActive = false;
                    lastClickTime = 0;
                }
            }

            bars.forEach(bar => {
                const currentOpacity = parseFloat(getComputedStyle(bar).opacity);
                if (currentOpacity > 0.1) {
                    bar.style.opacity = (currentOpacity - 0.02).toString();
                }
            });
        }, 50);

        // Input Listeners
        window.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            
            if (e.key.toLowerCase() === 'w' || e.key === 'ArrowUp') {
                if (e.key.toLowerCase() === 'w') {
                    keyW.classList.add('bg-sky-500/20', 'border-sky-500', 'text-sky-400');
                } else {
                    keyUp.classList.add('bg-sky-500/20', 'border-sky-500', 'text-sky-400');
                }
                registerClick(null);
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'w' || e.key === 'ArrowUp') {
                if (e.key.toLowerCase() === 'w') {
                    keyW.classList.remove('bg-sky-500/20', 'border-sky-500', 'text-sky-400');
                } else {
                    keyUp.classList.remove('bg-sky-500/20', 'border-sky-500', 'text-sky-400');
                }
                // SFX on Release
                playSfx();
            }
        });

        clickTarget.addEventListener('mousedown', (e) => {
            registerClick(e);
        });

        // SFX on mouse release
        clickTarget.addEventListener('mouseup', () => {
            playSfx();
        });

        resetBtn.addEventListener('click', () => {
            clickTimestamps = [];
            intervals = [];
            maxCps = 0;
            totalClicksDisplay.innerText = "0";
            cpsDisplay.innerText = "0.0";
            maxCpsDisplay.innerText = "0.0";
            consistencyDisplay.innerText = "100%";
            bars.forEach(b => b.style.height = '2px');
        });
    </script>
</body>
</html>
