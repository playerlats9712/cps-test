<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro CPS Tester - Configurable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow: hidden;
            touch-action: manipulation;
        }

        .stage {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #38bdf8 0%, #0ea5e9 100%);
            border-radius: 50%;
            filter: blur(20px);
            box-shadow: 0 0 60px rgba(56, 189, 248, 0.4);
            transition: transform 0.1s cubic-bezier(0.2, 0, 0.2, 1);
            will-change: transform;
        }

        .grid-bg {
            background-image: linear-gradient(#1e293b 1px, transparent 1px), linear-gradient(90deg, #1e293b 1px, transparent 1px);
            background-size: 40px 40px;
            position: absolute;
            inset: 0;
            opacity: 0.2;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        #visualizer {
            height: 60px;
            display: flex;
            align-items: flex-end;
            gap: 1px;
            z-index: 10;
        }

        .bar {
            flex: 1;
            background: #38bdf8;
            min-height: 2px;
            transition: height 0.1s ease;
            opacity: 0.3;
        }

        .active-key {
            border-color: #38bdf8 !important;
            color: #38bdf8 !important;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
            transform: scale(0.95);
        }

        .config-panel {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(56, 189, 248, 0.2);
            z-index: 50;
        }

        .binding-btn {
            transition: all 0.2s;
        }

        .binding-active {
            border-color: #38bdf8 !important;
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-between min-h-screen p-6 select-none">

    <!-- Config Modal -->
    <div id="config-modal" class="hidden fixed inset-0 flex items-center justify-center z-[100] bg-black/60 backdrop-blur-sm">
        <div class="config-panel p-8 rounded-3xl w-80 text-center space-y-6">
            <h3 class="text-xl font-bold text-sky-400 uppercase tracking-widest">Key Bindings</h3>
            <div class="space-y-4">
                <div class="flex flex-col gap-2">
                    <span class="text-xs text-slate-500 uppercase font-bold">Key 1</span>
                    <button id="bind-key-1" class="binding-btn py-4 bg-slate-900 border-2 border-slate-700 rounded-xl font-mono text-xl">W</button>
                </div>
                <div class="flex flex-col gap-2">
                    <span class="text-xs text-slate-500 uppercase font-bold">Key 2</span>
                    <button id="bind-key-2" class="binding-btn py-4 bg-slate-900 border-2 border-slate-700 rounded-xl font-mono text-xl">ArrowUp</button>
                </div>
            </div>
            <button id="close-config" class="w-full py-2 bg-sky-500 hover:bg-sky-400 text-white font-bold rounded-xl mt-4">DONE</button>
        </div>
    </div>

    <div class="stage">
        <div class="grid-bg"></div>
        <div id="orb" class="orb"></div>
    </div>

    <!-- Top Stats -->
    <div class="max-w-4xl w-full grid grid-cols-3 gap-4 relative z-10">
        <div class="stat-card p-4 rounded-2xl text-center">
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-1">CPS</p>
            <div id="cps-val" class="text-4xl font-800 text-white">0.0</div>
        </div>
        <div class="stat-card p-4 rounded-2xl text-center border-b-2 border-sky-500/30">
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-1">Consistency</p>
            <div id="consistency-val" class="text-4xl font-800 text-sky-400">100%</div>
        </div>
        <div class="stat-card p-4 rounded-2xl text-center">
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-1">Peak</p>
            <div id="max-cps-val" class="text-4xl font-800 text-amber-400">0.0</div>
        </div>
    </div>

    <!-- Central Interaction Zone -->
    <div id="main-zone" class="w-full flex flex-col items-center justify-center space-y-8 z-10">
        <div class="text-center">
            <h2 id="status-text" class="text-xl font-semibold text-slate-500 transition-colors">READY</h2>
        </div>

        <div class="flex gap-6">
            <div id="ui-key-1" class="w-20 h-20 rounded-2xl border-2 border-slate-800 flex items-center justify-center text-xl font-800 text-slate-700 transition-all uppercase">W</div>
            <div id="ui-key-2" class="w-20 h-20 rounded-2xl border-2 border-slate-800 flex items-center justify-center text-xl font-800 text-slate-700 transition-all uppercase">↑</div>
        </div>
    </div>

    <!-- Bottom Data -->
    <div class="max-w-4xl w-full space-y-4 relative z-10">
        <div id="visualizer" class="w-full bg-slate-900/30 rounded-lg overflow-hidden"></div>
        
        <div class="flex justify-between items-center">
            <div class="text-slate-500 text-sm">TOTAL ACTIONS: <span id="total-clicks" class="font-mono text-slate-300">0</span></div>
            <div class="flex gap-3">
                <button id="open-config" class="px-6 py-2 bg-slate-900 hover:bg-slate-800 text-slate-400 hover:text-white rounded-full transition-all border border-slate-800">CONFIG</button>
                <button id="reset-btn" class="px-6 py-2 bg-slate-900 hover:bg-slate-800 text-slate-400 hover:text-white rounded-full transition-all border border-slate-800">RESET</button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            config: {
                key1: 'w',
                key2: 'arrowup',
                isBinding: null // 'key1' or 'key2'
            },
            activeActions: 0,
            lastActionTime: performance.now(),
            actionTimestamps: [],
            intervals: [],
            maxCps: 0,
            totalActions: 0,
            isActive: false,
            orbOffset: 0,
            targetOffset: 0
        };

        const DOM = {
            orb: document.getElementById('orb'),
            cps: document.getElementById('cps-val'),
            maxCps: document.getElementById('max-cps-val'),
            consistency: document.getElementById('consistency-val'),
            total: document.getElementById('total-clicks'),
            visualizer: document.getElementById('visualizer'),
            uiKey1: document.getElementById('ui-key-1'),
            uiKey2: document.getElementById('ui-key-2'),
            reset: document.getElementById('reset-btn'),
            status: document.getElementById('status-text'),
            configModal: document.getElementById('config-modal'),
            openConfig: document.getElementById('open-config'),
            closeConfig: document.getElementById('close-config'),
            btnBind1: document.getElementById('bind-key-1'),
            btnBind2: document.getElementById('bind-key-2')
        };

        // Initialize Visualizer
        const BAR_COUNT = 80;
        for (let i = 0; i < BAR_COUNT; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            DOM.visualizer.appendChild(bar);
        }
        const bars = Array.from(document.querySelectorAll('.bar'));

        function updateBindingUI() {
            DOM.btnBind1.innerText = state.config.key1;
            DOM.btnBind2.innerText = state.config.key2;
            DOM.uiKey1.innerText = state.config.key1 === ' ' ? 'SPC' : state.config.key1.replace('arrow', '');
            DOM.uiKey2.innerText = state.config.key2 === ' ' ? 'SPC' : state.config.key2.replace('arrow', '');
        }

        function handleInput(isPress) {
            const now = performance.now();
            state.totalActions++;
            
            if (isPress) {
                state.activeActions++;
                state.targetOffset = -45;
            } else {
                state.activeActions = Math.max(0, state.activeActions - 1);
                state.targetOffset = (state.activeActions > 0) ? -45 : 45;
            }

            if (!state.isActive) {
                state.isActive = true;
                DOM.status.innerText = "ACTIVE";
                DOM.status.classList.replace('text-slate-500', 'text-sky-400');
            }

            const interval = now - state.lastActionTime;
            state.intervals.push(interval);
            if (state.intervals.length > 60) state.intervals.shift();

            state.actionTimestamps.push(now);
            state.lastActionTime = now;
            
            updateStats(now);
        }

        function updateStats(now) {
            state.actionTimestamps = state.actionTimestamps.filter(t => now - t < 1000);
            const currentCps = state.actionTimestamps.length;
            if (currentCps > state.maxCps) state.maxCps = currentCps;

            let consistency = 100;
            if (state.intervals.length > 5) {
                const mean = state.intervals.reduce((a, b) => a + b) / state.intervals.length;
                const variance = state.intervals.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / state.intervals.length;
                const stdDev = Math.sqrt(variance);
                const cv = stdDev / mean;
                const rhythmScore = Math.max(0, 100 - (cv * 120));
                const balanceScore = 100 - (Math.abs(state.targetOffset) / 45) * 20; 
                consistency = (rhythmScore * 0.8) + (balanceScore * 0.2);
            }

            DOM.cps.innerText = currentCps.toFixed(1);
            DOM.maxCps.innerText = state.maxCps.toFixed(1);
            DOM.consistency.innerText = Math.round(consistency) + "%";
            DOM.total.innerText = state.totalActions;

            const barIdx = Math.floor((now / 30) % BAR_COUNT);
            bars[barIdx].style.height = `${Math.min(100, currentCps * 4)}%`;
            bars[barIdx].style.opacity = '1';
        }

        function animate() {
            state.orbOffset += (state.targetOffset - state.orbOffset) * 0.15;
            DOM.orb.style.transform = `translateY(${state.orbOffset}px)`;

            const now = performance.now();
            if (state.isActive && now - state.lastActionTime > 1000) {
                state.isActive = false;
                state.targetOffset = 0;
                DOM.status.innerText = "STOPPED";
                DOM.status.classList.replace('text-sky-400', 'text-slate-500');
            }

            bars.forEach(bar => {
                const op = parseFloat(getComputedStyle(bar).opacity);
                if (op > 0.3) bar.style.opacity = (op - 0.01).toString();
            });

            requestAnimationFrame(animate);
        }

        // Input Listeners
        window.addEventListener('keydown', (e) => {
            if (state.config.isBinding) {
                e.preventDefault();
                state.config[state.config.isBinding] = e.key.toLowerCase();
                state.config.isBinding = null;
                DOM.btnBind1.classList.remove('binding-active');
                DOM.btnBind2.classList.remove('binding-active');
                updateBindingUI();
                return;
            }

            if (e.repeat) return;
            const key = e.key.toLowerCase();
            if (key === state.config.key1 || key === state.config.key2) {
                if (key === state.config.key1) DOM.uiKey1.classList.add('active-key');
                if (key === state.config.key2) DOM.uiKey2.classList.add('active-key');
                handleInput(true);
            }
        });

        window.addEventListener('keyup', (e) => {
            if (state.config.isBinding) return;
            const key = e.key.toLowerCase();
            if (key === state.config.key1 || key === state.config.key2) {
                if (key === state.config.key1) DOM.uiKey1.classList.remove('active-key');
                if (key === state.config.key2) DOM.uiKey2.classList.remove('active-key');
                handleInput(false);
            }
        });

        // UI Event Listeners
        DOM.openConfig.addEventListener('click', () => {
            DOM.configModal.classList.remove('hidden');
        });

        DOM.closeConfig.addEventListener('click', () => {
            DOM.configModal.classList.add('hidden');
            state.config.isBinding = null;
            DOM.btnBind1.classList.remove('binding-active');
            DOM.btnBind2.classList.remove('binding-active');
        });

        DOM.btnBind1.addEventListener('click', () => {
            state.config.isBinding = 'key1';
            DOM.btnBind1.classList.add('binding-active');
            DOM.btnBind2.classList.remove('binding-active');
            DOM.btnBind1.innerText = 'PRESS KEY...';
        });

        DOM.btnBind2.addEventListener('click', () => {
            state.config.isBinding = 'key2';
            DOM.btnBind2.classList.add('binding-active');
            DOM.btnBind1.classList.remove('binding-active');
            DOM.btnBind2.innerText = 'PRESS KEY...';
        });

        DOM.reset.addEventListener('click', () => {
            state.actionTimestamps = [];
            state.intervals = [];
            state.maxCps = 0;
            state.totalActions = 0;
            state.targetOffset = 0;
            DOM.cps.innerText = "0.0";
            DOM.maxCps.innerText = "0.0";
            DOM.consistency.innerText = "100%";
            DOM.total.innerText = "0";
            bars.forEach(b => b.style.height = '2px');
        });

        // Initialize UI and loop
        updateBindingUI();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
